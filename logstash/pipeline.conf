# ============================================================
# Logstash Pipeline — SOC Platform
# Enrichissement et normalisation des logs Suricata + Wazuh
# ============================================================

input {
  # ----------------------------------------------------------
  # Logs Suricata EVE JSON
  # ----------------------------------------------------------
  file {
    path => "/var/log/suricata/eve.json"
    start_position => "end"
    sincedb_path => "/usr/share/logstash/data/sincedb_suricata"
    codec => json
    type => "suricata"
    tags => ["suricata", "network"]
  }

  # ----------------------------------------------------------
  # Wazuh via beats (si agent Filebeat sur le manager)
  # ----------------------------------------------------------
  beats {
    port => 5044
    type => "wazuh"
    tags => ["wazuh", "hids"]
  }

  # ----------------------------------------------------------
  # Syslog direct (équipements réseau)
  # ----------------------------------------------------------
  syslog {
    port => 5140
    type => "syslog"
    tags => ["syslog"]
  }
}

# ============================================================
filter {
  # ----------------------------------------------------------
  # Suricata — Enrichissement des alertes réseau
  # ----------------------------------------------------------
  if [type] == "suricata" {

    # Normaliser les champs communs
    mutate {
      rename => {
        "[src_ip]"    => "[source][ip]"
        "[dest_ip]"   => "[destination][ip]"
        "[src_port]"  => "[source][port]"
        "[dest_port]" => "[destination][port]"
        "[proto]"     => "[network][protocol]"
      }
    }

    # Parser le timestamp EVE
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }

    # Enrichissement GeoIP source
    if [source][ip] {
      geoip {
        source => "[source][ip]"
        target => "[source][geo]"
        fields => ["city_name", "country_code2", "country_name", "location", "region_name", "timezone"]
      }
    }

    # Enrichissement GeoIP destination
    if [destination][ip] {
      geoip {
        source => "[destination][ip]"
        target => "[destination][geo]"
        fields => ["city_name", "country_code2", "country_name", "location"]
      }
    }

    # Alertes Suricata — ajouter severity lisible
    if [event_type] == "alert" {
      mutate {
        add_field => {
          "[event][category]"  => "intrusion_detection"
          "[event][kind]"      => "alert"
          "[event][severity]"  => "%{[alert][severity]}"
          "[rule][name]"       => "%{[alert][signature]}"
          "[rule][id]"         => "%{[alert][signature_id]}"
          "[rule][category]"   => "%{[alert][category]}"
        }
      }

      # Severity numérique → texte
      if [alert][severity] == 1 {
        mutate { add_field => { "[event][severity_label]" => "CRITICAL" } }
      } else if [alert][severity] == 2 {
        mutate { add_field => { "[event][severity_label]" => "HIGH" } }
      } else if [alert][severity] == 3 {
        mutate { add_field => { "[event][severity_label]" => "MEDIUM" } }
      } else {
        mutate { add_field => { "[event][severity_label]" => "LOW" } }
      }
    }

    # DNS logs — détecter domaines suspects (longueur > 50 chars)
    if [event_type] == "dns" and [dns][rrname] {
      ruby {
        code => "
          domain = event.get('[dns][rrname]')
          if domain && domain.length > 50
            event.set('[dns][suspicious_length]', true)
          end
          # Détecter DGA patterns (trop de consonnes)
          if domain
            vowels = domain.scan(/[aeiou]/i).length.to_f
            total  = domain.gsub('.', '').length.to_f
            ratio  = total > 0 ? vowels / total : 0
            event.set('[dns][vowel_ratio]', ratio.round(3))
            event.set('[dns][possible_dga]', ratio < 0.2 && total > 10)
          end
        "
      }
    }

    # TLS — extraire JA3/JA3S pour fingerprint
    if [event_type] == "tls" {
      mutate {
        add_field => {
          "[tls][client][ja3]" => "%{[tls][ja3][hash]}"
          "[tls][server][ja3s]" => "%{[tls][ja3s][hash]}"
        }
      }
    }
  }

  # ----------------------------------------------------------
  # Wazuh — Normalisation des alertes HIDS
  # ----------------------------------------------------------
  if [type] == "wazuh" {

    # Parser JSON si nécessaire
    if [message] =~ /^\{/ {
      json {
        source => "message"
        target => "wazuh"
        remove_field => ["message"]
      }
    }

    # Ajouter MITRE comme tag si présent
    if [wazuh][rule][mitre][id] {
      mutate {
        add_tag => ["mitre_mapped"]
      }
    }

    # Niveau Wazuh → severity standard
    if [wazuh][rule][level] {
      ruby {
        code => "
          level = event.get('[wazuh][rule][level]').to_i
          if level >= 14
            event.set('[event][severity_label]', 'CRITICAL')
            event.set('[event][severity]', 1)
          elsif level >= 10
            event.set('[event][severity_label]', 'HIGH')
            event.set('[event][severity]', 2)
          elsif level >= 7
            event.set('[event][severity_label]', 'MEDIUM')
            event.set('[event][severity]', 3)
          else
            event.set('[event][severity_label]', 'LOW')
            event.set('[event][severity]', 4)
          end
        "
      }
    }

    # Enrichissement GeoIP si srcip présent
    if [wazuh][data][srcip] {
      geoip {
        source => "[wazuh][data][srcip]"
        target => "[source][geo]"
      }
      mutate {
        copy => { "[wazuh][data][srcip]" => "[source][ip]" }
      }
    }
  }

  # ----------------------------------------------------------
  # Commun à tous — Nettoyage
  # ----------------------------------------------------------
  mutate {
    remove_field => ["host", "agent", "ecs", "_score"]
    convert => {
      "[source][port]"      => "integer"
      "[destination][port]" => "integer"
    }
  }

  # Ajouter timestamp ingestion
  ruby {
    code => "event.set('[event][ingested]', Time.now.utc.iso8601(3))"
  }
}

# ============================================================
output {
  # ----------------------------------------------------------
  # OpenSearch — Index par type et date
  # ----------------------------------------------------------
  opensearch {
    hosts            => ["https://opensearch:9200"]
    user             => "admin"
    password         => "${OPENSEARCH_PASSWORD}"
    ssl              => true
    ssl_certificate_verification => false

    # Index dynamique : soc-suricata-2024.01.15
    index => "soc-%{type}-%{+YYYY.MM.dd}"

    # ILM pour gestion du cycle de vie (rétention auto)
    ilm_enabled           => true
    ilm_rollover_alias    => "soc-%{type}"
    ilm_pattern           => "000001"
    ilm_policy            => "soc-ilm-policy"
  }

  # Debug local (désactiver en production)
  # stdout { codec => rubydebug }
}
