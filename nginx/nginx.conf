# ============================================================
# Nginx — Reverse Proxy SOC Platform
# Point d'entrée unique HTTPS — Port 443
# Sécurité maximale : TLS 1.2/1.3, HSTS, headers stricts
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ----------------------------------------------------------
    # Logging structuré (JSON pour ingestion Wazuh/Logstash)
    # ----------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"http_referer":"$http_referer",'
            '"user_agent":"$http_user_agent",'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;  # Ne pas exposer la version Nginx

    # ----------------------------------------------------------
    # Gzip
    # ----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ----------------------------------------------------------
    # Rate limiting global
    # ----------------------------------------------------------
    limit_req_zone  $binary_remote_addr zone=api:10m    rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=login:10m  rate=5r/m;   # Anti-bruteforce login
    limit_req_zone  $binary_remote_addr zone=global:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ----------------------------------------------------------
    # Redirect HTTP → HTTPS
    # ----------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ----------------------------------------------------------
    # Serveur principal HTTPS
    # ----------------------------------------------------------
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        # -- TLS --------------------------------------------------
        ssl_certificate     /etc/nginx/certs/soc.crt;
        ssl_certificate_key /etc/nginx/certs/soc.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # HSTS (1 an, inclure sous-domaines)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # -- Headers sécurité -------------------------------------
        add_header X-Frame-Options            "DENY"                          always;
        add_header X-Content-Type-Options     "nosniff"                       always;
        add_header X-XSS-Protection           "1; mode=block"                 always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none';" always;

        # -- Limites connexion ------------------------------------
        limit_conn conn 50;
        client_max_body_size 10m;

        # -- Frontend React --------------------------------------
        location / {
            limit_req zone=global burst=50 nodelay;
            proxy_pass         http://soc-frontend:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # -- API REST --------------------------------------------
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://soc-api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # -- Login : rate limit ultra strict ---------------------
        location /api/v1/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass         http://soc-api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # -- WebSocket alertes temps réel ------------------------
        location /api/v1/alerts/ws {
            proxy_pass         http://soc-api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # -- Health check (non loggué) ---------------------------
        location /health {
            access_log off;
            proxy_pass http://soc-api:8000;
        }

        # -- Bloquer accès aux fichiers sensibles -----------------
        location ~ /\. {
            deny all;
            return 404;
        }
        location ~ \.(env|bak|sql|log|conf)$ {
            deny all;
            return 404;
        }

        # -- Pages d'erreur personnalisées ------------------------
        error_page 429 /429.json;
        error_page 502 503 504 /50x.json;

        location = /429.json {
            internal;
            add_header Content-Type application/json always;
            return 429 '{"detail":"Trop de requêtes — merci de ralentir"}';
        }
        location = /50x.json {
            internal;
            add_header Content-Type application/json always;
            return 502 '{"detail":"Service temporairement indisponible"}';
        }
    }
}
